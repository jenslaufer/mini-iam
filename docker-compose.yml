services:
  launch-kit:
    build: ./backend
    image: ghcr.io/solytics/launch-kit:latest
    volumes:
      - launch-kit-data:/data
    environment:
      PORT: "${PORT}"
      ISSUER_URL: "${ISSUER_URL}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      DEFAULT_TENANT: "${DEFAULT_TENANT}"
      DEFAULT_TENANT_REGISTRATION: "${DEFAULT_TENANT_REGISTRATION:-}"
      RATE_LIMIT_LOGIN: "${RATE_LIMIT_LOGIN:-}"
      RATE_LIMIT_REGISTER: "${RATE_LIMIT_REGISTER:-}"
      RATE_LIMIT_FORGOT_PASSWORD: "${RATE_LIMIT_FORGOT_PASSWORD:-}"
      RATE_LIMIT_TOKEN: "${RATE_LIMIT_TOKEN:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ghcr.io/solytics/launch-kit-frontend:latest
    ports:
      - "${EXTERNAL_PORT}:3000"
    depends_on:
      launch-kit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  launch-kit-data:
