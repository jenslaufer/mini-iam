services:
  mini-iam:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - mini-iam-data:/data
    environment:
      PORT: "8080"
      ISSUER_URL: "http://localhost:8080"
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mini-iam-data:
