services:
  launch-kit:
    build: ./backend
    volumes:
      - launch-kit-data:/data
    environment:
      PORT: "8080"
      ISSUER_URL: "http://localhost:3000/auth"
      CORS_ORIGINS: "*"
      ADMIN_EMAIL: "admin@launch-kit.local"
      ADMIN_PASSWORD: "changeme"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      launch-kit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  launch-kit-data:
